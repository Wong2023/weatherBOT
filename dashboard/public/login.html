<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weatherBOT — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'JetBrains Mono', monospace; } </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-blue-400 font-bold text-2xl mb-1">weatherBOT</div>
      <div class="text-slate-500 text-sm">London Max Temp · Polymarket</div>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8">
      <h1 class="text-lg font-semibold mb-6 text-slate-200">Sign in</h1>

      <div id="error-msg" class="hidden mb-4 px-3 py-2 bg-red-900/50 border border-red-700 rounded-lg text-sm text-red-300">
        Wrong username or password
      </div>

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1.5">Username</label>
          <input
            type="text"
            name="username"
            autocomplete="username"
            required
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors"
          >
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1.5">Password</label>
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors"
          >
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors mt-2"
        >
          Sign in
        </button>
      </form>
    </div>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').classList.remove('hidden');
    }
  </script>
</body>
</html>
